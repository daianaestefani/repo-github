<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eMercado - Información de Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container my-5">
        <h2 id="productName">Cargando...</h2>
        <hr>
        <div class="row">
            <div class="col-md-6" id="productImages"></div> <div class="col-md-6">
                <p><strong>Precio:</strong> <span id="productMoneda"></span> <span id="productPrice"></span></p>
                <p><strong>Descripción:</strong> <span id="proDescription"></span></p>
                <p><strong>Vendidos:</strong> <span id="soldCount"></span></p>
            </div>
        </div>
        <hr>
        <h5>Productos relacionados</h5>
        <div class="row" id="proRelacionados"></div> <hr>
        <h5>Comentarios</h5>
        <div id="productComments"></div>
    </main>
    <script src="js/init.js"></script>
    <script src="js/product-info.js"></script>
</body>
</html>
