<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Información del Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <h2 id="productName">Cargando...</h2>
        <hr>
        <p><strong>Precio:</strong> <span id="productPrice"></span></p>
        <p><strong>Descripción:</strong> <span id="proDescription"></span></p>
        <p><strong>Vendidos:</strong> <span id="soldCount"></span></p>
        
        <h5>Imágenes</h5>
        <div id="productImages" class="row"></div>
        
        <h5>Relacionados</h5>
        <div id="proRelacionados" class="row"></div>
    </div>
    
    <script src="js/init.js"></script>
    <script src="js/product-info.js"></script>
</body>
</html>
